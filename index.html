<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PianoWorks</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="main-wrapper">

    <div class="app-bar">
        <div class="title">Piano Works</div>
        <div class="nav">
            <button data-view="piano" class="active">ピアノ</button>
            <button data-view="settings">設定</button>
            <button data-view="ai">AIアシスト</button>
        </div>
    </div>

    <div class="piano-controls">
      <div class="octave-section">
        <button id="octave-down">←</button>
        <div id="octave-label">オクターブ：4</div>
        <button id="octave-up">→</button>
      </div>

      <div class="separator"></div>

      <div class="rows-container">
        <div class="control-row">
          <span class="group-label">USER REC</span>
          <button id="record-btn" class="rec-btn">● REC</button>
          <button id="user-play-pause-btn">▶ Play</button>
          <button id="user-stop-btn">■ Stop</button>
        </div>
        
        <div class="control-row">
          <span class="group-label">MIDI PLAYER</span>
          <button id="midi-import-trigger" class="rec-btn">● REC</button>
          <button id="midi-play-pause-btn">▶ Play</button>
          <button id="midi-stop-btn">■ Stop</button>
        </div>
      </div>
    </div>

    <div id="midi-import-wrapper">
        <div id="midi-import-button" style="cursor: pointer;">
            <span class="text">IMPORT MIDI</span>
        </div>
        <input type="file" id="midi-upload" accept=".mid,.midi" style="display:none;" multiple>

        <div id="current-midi-title" style="margin-top:10px; padding:5px; background:rgba(255,255,255,0.1); border:1px solid #555; font-size:12px; color:#ddd; text-align:center; border-radius:4px; min-height:18px;">
            No file selected
        </div>

        <ul id="midi-playlist" style="margin-top:10px; list-style:none; padding:0; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:4px; font-size:11px;">
        </ul>
    </div>

    <div id="view-piano" class="view active">
        <div class="piano-outer">
            <div class="piano-container">
                <div id="piano-canvas" class="piano"></div>
            </div>
        </div>
    </div>

    <div id="view-settings" class="view panel">
        <h2>SETTINGS</h2>
        
        <div class="settings-content" style="display: none;">
            <label>API Key</label>
            <input type="password" id="api-key-input" placeholder="sk-xxxx..." />
            <button id="save-key">保存</button>
            <button id="test-key">接続テスト</button>
        </div>

        <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 100px;">
            Settings will be added here.
        </p>
    </div>

    <div id="view-ai" class="view panel">
        <h2>AI アシスト</h2>
        <p>ここに AI 機能を追加できます。</p>
    </div>

    <button id="exit-button">終了</button>

    <div id="extra-content-area" style="width: 1300px; margin: 20px auto; text-align: center; color: white;">
        
        <div class="youtube-container" style="background: #000; border: 2px solid #444; border-radius: 8px; overflow: hidden; display: inline-block;">
            <iframe id="youtube-player" 
                    width="210" 
                    height="120" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>

        <div style="margin-top: -30px; display: flex; justify-content: center; gap: 10px;">
            <input type="text" id="youtube-url-input" 
                   placeholder="YouTubeのURLをここに貼り付け（例: https://www.youtube.com/watch?v=...）" 
                   style="width: 600px; padding: 12px; border-radius: 4px; border: 1px solid #555; background: #222; color: white;">
            
            <button id="load-youtube-btn" 
                    style="padding: 10px 25px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                動画を読み込む
            </button>
        </div>
    </div>

</div>
