<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PianoWorks</title>
    
    <link rel="stylesheet" href="css/theme.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/components.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/piano.css"> 
    <link rel="stylesheet" href="css/ui.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
    <div id="video-background">
        <video id="local-video-player" playsinline style="width: 100%; height: 100%; object-fit: cover; display: none;"></video>
    </div>

    <div id="control-panel-wrapper" style="position: fixed; left: 20px; bottom: 195px; z-index: 9999; display: flex; gap: 15px;">
        <div id="antique-volume-fader" class="fader-container">
            <span class="fader-label">MIN</span>
            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.5">
            <span class="fader-label">MAX</span>
            <div class="volume-display">
                <input type="number" id="volume-input" min="0" max="99" value="50">
            </div>
        </div>

        <div id="antique-bpm-fader" class="fader-container">
            <span class="fader-label">SLOW</span>
            <input type="range" id="bpm-slider" min="40" max="240" step="1" value="120">
            <span class="fader-label">FAST</span>
            <div class="volume-display">
                <input type="number" id="bpm-input" min="40" max="240" value="120">
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <header class="app-bar">
            <div class="brand">Piano Works</div>
        </header>

        <div class="control-panel-container">
            <div class="mode-selector-stack">
                
                <div class="mode-tag" id="tag-perform" data-mode="perform">
                    <img src="assets/tag_perform.png" alt="PERFORM">
                    <div class="perform-controls">
                        <div class="btn-stamp-gold perform-play-btn" id="video-play-btn">▶ PLAY</div>
                        <div class="yt-import-group">
                            <div class="btn-stamp-gold yt-import-btn" id="video-import-btn">IMPORT VIDEO</div>
                            <div class="display-sunken yt-url-display" id="video-filename-display">No Video Loaded</div>
                            <input type="file" id="video-upload-input" accept="video/*" style="display:none;">
                        </div>
                    </div>
                </div>

                <div class="mode-tag active" id="tag-session" data-mode="session">
                    <img src="assets/tag_session.png" alt="Session">
                </div>

                <div class="mode-tag" id="tag-studio" data-mode="studio">
                    <img src="assets/tag_studio.png" alt="Studio">
                    <div class="btn-stamp-base play-stamp" id="studio-play-btn">▶ PLAY</div>
                    <div class="btn-stamp-base stop-stamp" id="studio-stop-btn">■ STOP</div>
                    <div class="studio-stacked-btns">
                        <div class="btn-stamp-base record-stamp" id="studio-rec-btn">● REC</div>
                        <div class="btn-stamp-base guide-stamp" id="studio-guide-btn">GUIDE OFF</div>
                    </div>
                    <div class="display-sunken song-title-display yt-url-display" id="studio-song-display">
                        No MIDI Loaded
                    </div>
                </div> 
            </div> 
        </div>

        <div class="midi-station-container">
            <div id="playlist-icon-btn" class="playlist-icon-wrapper">
                <img src="assets/pianoworks_playlist_cover.png" alt="Playlist Archive">
            </div>

            <label for="midi-upload" class="playlist-easel">
                <img src="assets/playlist-easel.png" alt="Playlist Easel">
                <div id="midi-playlist-text" class="easel-text-overlay">
                    <div id="display-filename" style="opacity: 0.6;">Click to Import MIDI</div>
                </div>
                <input type="file" id="midi-upload" accept=".mid,.midi" style="display:none;">
            </label>
        </div>

        <section id="view-piano" class="view-panel active">
            <div class="blackboard-container"></div>
            <div class="piano-minimap-container">
                <div id="minimap-base" class="minimap-base">
                    <div id="minimap-viewport-frame" class="minimap-viewport-frame"></div>
                </div>
            </div>
            <div id="piano-viewport">
                <div id="piano-canvas" class="piano-keyboard"></div>
            </div>
        </section>
    </div>

    <div id="common-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-wood-box modal-content-wrapper">
            <div id="modal-dynamic-content"></div>
            <div class="modal-close-btn" id="modal-close-btn">CANCEL</div>
        </div>
    </div>

<div id="playlist-modal-overlay" class="modal-overlay" style="display: none;">
    <div class="lottie-container" style="position: relative; width: 600px; height: 600px;">
        <div id="book-lottie-canvas" style="width: 100%; height: 100%;"></div>

        <div id="playlist-content-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: opacity 0.5s;">
            <div class="playlist-close-ink" id="playlist-close-btn">×</div>
            <div id="playlist-items-container"></div>
        </div>
    </div>
</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
